name: ASD MLOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Test Prediction Pipeline Import
        run: |
          python -c "from src.prediction.ASD_prediction import ASD_Prediction"

      - name: Test Gradio App Import
        run: |
          python -c "import app"

      - name: Build Docker Image
        run: |
          docker build -t asd-mlops .