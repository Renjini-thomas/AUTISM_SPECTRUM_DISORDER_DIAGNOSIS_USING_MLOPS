# name: ASD MLOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Load DagsHub Secrets
        run: |
          echo "DAGSHUB_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Test Prediction Pipeline Import
        run: |
          python -c "from src.prediction.ASD_prediction import ASD_Prediction"

      
      - name: Test Flask App Import
        run: |
          python -c "import app; assert app.app is not None"

      
      - name: Verify Template Exists
        run: |
          test -f templates/index.html || (echo "templates/index.html missing!" && exit 1)

      - name: Build Docker Image
        run: |
          docker build -t asd-mlops .
      
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: |
          docker tag asd-mlops ${{ secrets.DOCKER_USERNAME }}/asd-mlops:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/asd-mlops:latest
